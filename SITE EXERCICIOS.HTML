<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="./css/main/layout/tema_pagina/modoescuro.css">
</head>
<body class="page--dark-theme">

    <header class="header">
        <h1 class="header__titulo">Teste Site Dark</h1>
        <nav class="header__nav">
            <ul class="header__list">
                <li class="header__item"><a href="#" class="header__link header__link--active">Home</a></li>
                <li class="header__item"><a href="#" class="header__link">Sobre</a></li>
            </ul>
        </nav>
    </header>

    <main class="content">
        <section class="card">
            <h2 class="card__title">Título do Cartao</h2>
            <p class="card__text">Tentando modificar o fundo da página.</p>
            <button class="card__button card__button--primary">Mudar Tema ☀</button>
        </section>
    </main>

</body>

<script>
const botao = document.querySelector('.cartao__botao');
const cartao = document.querySelector('.cartao');
botao.addEventListener('click', () => {
    cartao.classList.toggle('cartao--claro');
});
</script>
</html>
